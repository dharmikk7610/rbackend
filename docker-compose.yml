version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: royal-mysql
    ports:
      - "3309:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: royalclasses
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  backend:
    build: .
    container_name: royal-backend
    ports:
      - "9090:9999"
    depends_on:
      - mysql
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/royalclasses?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: your_email@gmail.com
      SPRING_MAIL_PASSWORD: your_app_password

volumes:
  mysql_data: